<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAgro | AI Crop Recommendation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05); }
        input[type="range"] { -webkit-appearance: none; height: 6px; background: #e2e8f0; border-radius: 5px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #1F7D53; cursor: pointer; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.1); transition: all 0.2s ease; }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); background: #4CAF50; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .results-sidebar { transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); transform: translateX(-100%); opacity: 0; visibility: hidden; }
        .results-sidebar.active { transform: translateX(0); opacity: 1; visibility: visible; }
        .custom-select { appearance: none; background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e"); background-position: right 0.75rem center; background-repeat: no-repeat; background-size: 1.25em 1.25em; }
        #toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 1000; }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-x-hidden">

    <header id="main-nav" class="sticky top-0 z-50 w-full bg-[#27391C]/95 backdrop-blur-sm border-b border-white/10 shadow-lg font-['Space_Grotesk']">
        <div class="max-w-[1440px] mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3 cursor-pointer">
                <div class="w-12 h-12 flex items-center justify-center relative">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                        <defs>
                            <linearGradient id="agroGradient" x1="12" y1="2" x2="12" y2="22" gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#4CAF50"/><stop offset="100%" stop-color="#1B5E20"/>
                            </linearGradient>
                        </defs>
                        <path d="M12 22L17.2 19V13L12 10L6.8 13V19L12 22Z" fill="#E8F5E9" fill-opacity="0.2" stroke="#2D5A27" stroke-width="0.5"/>
                        <path d="M12 14C12 14 7 12 5 7C5 3 9 2 12 7V14Z" fill="url(#agroGradient)" />
                        <path d="M12 14C12 14 17 12 19 7C19 3 15 2 12 7V14Z" fill="#81C784" />
                        <path d="M12 21V10" stroke="#1B5E20" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="flex flex-col leading-tight">
                    <h1 class="text-xl font-bold text-white">Smart<span class="text-[#4CAF50]">Agro</span></h1>
                    <span class="text-[10px] uppercase text-white/60 font-bold">Systems AI</span>
                </div>
            </div>
            <nav class="hidden md:flex items-center gap-1">
                <a class="px-4 py-2 text-sm font-medium text-[#c1dcb0] hover:text-white" href="#">Predict</a>
                <a class="px-4 py-2 text-sm font-medium text-[#c1dcb0] hover:text-white" href="#">History</a>
            </nav>
            <div id="user-display" class="text-white text-[10px] font-mono opacity-50 hidden lg:block">Connecting...</div>
        </div>
    </header>

    <div id="toast" class="glass-card px-6 py-4 rounded-2xl flex items-center gap-3 shadow-2xl border-emerald-100">
        <i id="toast-icon" class="fas fa-info-circle text-emerald-500"></i>
        <span id="toast-message" class="text-sm font-bold text-slate-700"></span>
    </div>

    <main class="min-h-screen p-4 md:p-10 pt-12">
        <div class="max-w-7xl mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <!-- Input Panel -->
                <div id="input-panel" class="lg:col-span-12 transition-all duration-700">
                    <div class="glass-card rounded-[2.5rem] p-8 md:p-10">
                        <div class="flex items-center justify-between mb-10 border-b pb-6">
                            <h2 class="text-xl font-bold text-slate-800 flex items-center gap-3">
                                <i class="fas fa-microscope text-[#1F7D53]"></i>
                                Field Parameter Analysis
                            </h2>
                        </div>

                        <!-- Soil Nutrients -->
                        <div class="mb-14">
                            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">I. Soil Nutrients (NPK)</h3>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <div class="space-y-4">
                                    <div class="flex justify-between"><label class="text-[10px] font-black">Nitrogen (N)</label><span id="val-n" class="text-xs font-bold bg-emerald-50 px-2 py-1 rounded">80</span></div>
                                    <input type="range" id="input-n" min="1" max="300" value="80" class="w-full">
                                </div>
                                <div class="space-y-4">
                                    <div class="flex justify-between"><label class="text-[10px] font-black">Phosphorus (P)</label><span id="val-p" class="text-xs font-bold bg-emerald-50 px-2 py-1 rounded">50</span></div>
                                    <input type="range" id="input-p" min="1" max="300" value="50" class="w-full">
                                </div>
                                <div class="space-y-4">
                                    <div class="flex justify-between"><label class="text-[10px] font-black">Potassium (K)</label><span id="val-k" class="text-xs font-bold bg-emerald-50 px-2 py-1 rounded">100</span></div>
                                    <input type="range" id="input-k" min="1" max="300" value="100" class="w-full">
                                </div>
                            </div>
                        </div>

                        <!-- Environmental -->
                        <div>
                            <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">II. Environmental & Soil Properties</h3>
                            <div class="flex gap-4 mb-8">
                                <button id="autofill-btn" class="px-6 py-3 bg-[#27391C] hover:bg-[#1F7D53] text-white text-[10px] font-black uppercase rounded-xl transition-all">
                                    <i class="fas fa-location-crosshairs mr-2"></i>Sync Live Data
                                </button>
                                <div id="location-display" class="hidden flex items-center gap-2 px-4 py-2 bg-emerald-50 border rounded-full">
                                    <i class="fas fa-location-dot text-[#1F7D53] text-[11px]"></i>
                                    <span id="current-location-text" class="text-[10px] font-black text-[#1F7D53]"></span>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-10">
                                <div class="space-y-4">
                                    <div class="flex justify-between"><label class="text-[10px] font-black">Temperature (°C)</label><span id="val-temp" class="text-xs font-bold bg-orange-50 px-2 py-1 rounded">25</span></div>
                                    <input type="range" id="input-temp" min="0" max="50" value="25" class="w-full">
                                </div>
                                <div class="space-y-4">
                                    <div class="flex justify-between"><label class="text-[10px] font-black">Rainfall (mm)</label><span id="val-rain" class="text-xs font-bold bg-blue-50 px-2 py-1 rounded">1200</span></div>
                                    <input type="range" id="input-rain" min="0" max="3000" value="1200" class="w-full">
                                </div>
                                <div class="space-y-4">
                                    <div class="flex justify-between"><label class="text-[10px] font-black">Humidity (%)</label><span id="val-hum" class="text-xs font-bold bg-cyan-50 px-2 py-1 rounded">70</span></div>
                                    <input type="range" id="input-hum" min="0" max="100" value="70" class="w-full">
                                </div>
                                <div class="space-y-4">
                                    <div class="flex justify-between"><label class="text-[10px] font-black">Soil pH</label><span id="val-ph" class="text-xs font-bold bg-amber-50 px-2 py-1 rounded">6.5</span></div>
                                    <input type="range" id="input-ph" min="3" max="10" step="0.1" value="6.5" class="w-full">
                                </div>
                                <div class="space-y-4">
                                    <label class="text-[10px] font-black uppercase">Soil Classification</label>
                                    <select id="soil-select" class="w-full p-4 rounded-2xl border bg-white text-sm font-bold custom-select outline-none">
                                        <option value="Loamy">Loamy</option>
                                        <option value="Red">Red</option><option value="Forest">Forest</option>
                                        <option value="Alluvial">Alluvial</option><option value="Laterite">Laterite</option>
                                        <option value="Black (Regur)">Black (Regur)</option><option value="Sandy">Sandy</option>
                                    </select>
                                </div>
                                <div class="space-y-4">
                                    <label class="text-[10px] font-black uppercase">Season Context</label>
                                    <select id="season-select" class="w-full p-4 rounded-2xl border bg-white text-sm font-bold custom-select outline-none">
                                        <option value="Kharif">Kharif</option>
                                        <option value="Rabi">Rabi</option>
                                        <option value="Zaid">Zaid</option>
                                        <option value="Perennial">Perennial</option>
                                    </select>
                                </div>
                                <!-- <script>
                                    (function() {
                                        const m = new Date().getMonth() + 1;
                                        let s = "Kharif";
                                        if (m >= 3 && m <= 6) s = "Zaid";
                                        else if (m >= 11 || m <= 2) s = "Rabi";
                                        
                                        // This runs instantly as the HTML loads, guaranteeing the update
                                        document.getElementById('season-select').value = s;
                                    })();
                                </script> -->
                            </div>
                        </div>

                        <button id="predict-btn" class="w-full mt-10 py-5 bg-[#1F7D53] hover:bg-[#2D5A27] text-white font-bold rounded-2xl shadow-xl transition-all flex items-center justify-center gap-3 text-lg">
                            <i class="fas fa-brain"></i>
                            Analyze with XGBoost Model
                        </button>
                    </div>
                </div>

                <!-- Results Sidebar -->
                <div id="results-column" class="hidden lg:col-span-5 transition-all duration-700">
                    <div class="sticky top-24 results-sidebar" id="results-animated-container">
                        <div class="glass-card rounded-[2.5rem] p-8 shadow-lg min-h-[500px] flex flex-col border-emerald-50">
                            <div class="flex items-center justify-between mb-8 border-b pb-4">
                                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2"><i class="fas fa-chart-line text-[#1F7D53]"></i>AI Prediction</h2>
                            </div>

                            <div id="result-loading" class="hidden flex-1 flex flex-col items-center justify-center space-y-4">
                                <div class="w-12 h-12 border-4 border-slate-100 border-t-[#1F7D53] rounded-full animate-spin"></div>
                                <p class="text-sm font-bold text-slate-500">Querying Backend...</p>
                            </div>

                            <div id="result-content" class="hidden flex-1 fade-in">
                                <div class="bg-gradient-to-br from-[#27391C] to-[#1F7D53] rounded-3xl p-8 text-white mb-8 shadow-xl">
                                    <span class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-black uppercase">Top Recommendation</span>
                                    <h3 id="top-crop-name" class="text-4xl font-black mt-4 mb-2">...</h3>
                                    <div id="top-crop-conf" class="text-emerald-100 font-bold text-sm">...</div>
                                </div>
                                <div id="alternative-list" class="space-y-3"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Firebase SDKs & Application Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 1. SAFE UI INITIALIZATION (Run First)
        // ==========================================
        const inputIds = ['n', 'p', 'k', 'ph', 'temp', 'hum', 'rain'];
        const inputs = {};
        const labels = {};
        
        inputIds.forEach(id => {
            const inputEl = document.getElementById(`input-${id}`);
            const labelEl = document.getElementById(`val-${id}`);
            if (inputEl && labelEl) {
                inputs[id] = inputEl;
                labels[id] = labelEl;
                inputEl.addEventListener('input', (e) => {
                    labelEl.innerText = e.target.value;
                });
            }
        });

        const soilSelect = document.getElementById('soil-select');
        const seasonSelect = document.getElementById('season-select');
        const predictBtn = document.getElementById('predict-btn');
        const autofillBtn = document.getElementById('autofill-btn');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toast-message');

        const showToast = (message, icon = 'fa-info-circle') => {
            toastMsg.innerText = message;
            document.getElementById('toast-icon').className = `fas ${icon} text-[#1F7D53]`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        };

        

        // ==========================================
        // 2. SAFE FIREBASE SETUP (Try/Catch Wrapped)
        // ==========================================
        let db = null;
        let currentUser = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'smartagro-default';

        try {
            if (typeof __firebase_config !== 'undefined') {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                db = getFirestore(app);

                signInAnonymously(auth).catch(err => console.warn("Auth failed:", err));
                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    const display = document.getElementById('user-display');
                    if (user && display) {
                        display.innerText = `UID: ${user.uid.substring(0,6)}...`;
                        display.classList.remove('hidden');
                    }
                });
            } else {
                console.warn("Firebase config not found. Running UI in offline mode.");
            }
        } catch (err) {
            console.warn("Firebase initialization skipped.", err);
        }

        // ==========================================
        // 3. APPLICATION LOGIC
        // ==========================================
        
        // Soil Classification Helper
        const classifySoil = (props, lat, lon) => {
            const { clayRaw, sandRaw, siltRaw, ph } = props;
            const clay = (clayRaw || 0) / 10;
            const sand = (sandRaw || 0) / 10;
            const silt = (siltRaw || 0) / 10;

            if (ph > 8.2) return "Saline";
            if (ph < 5.0) return "Laterite";
            if (lat > 15 && lat < 25 && lon > 73 && lon < 80) return "Black (Regur)";
            if (clay > 40) return "Clayey";
            if (sand > 85) return "Sandy";
            if (sand > 50 && clay > 20) return "Sandy Loam";
            if (silt > 50) return "Alluvial"; 
            if (ph < 6.0 && (lat > 30 || lat < -30)) return "Forest";

            return "Loamy";
        };

        // Autofill External API Sync
        if (autofillBtn) {
            autofillBtn.addEventListener('click', async () => {
                if (!navigator.geolocation) {
                    showToast("Location not supported", "fa-triangle-exclamation");
                    return;
                }

                autofillBtn.innerHTML = `<i class="fas fa-spinner animate-spin"></i> Syncing...`;
                autofillBtn.disabled = true;

                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    const formatDate = (d) => d.toISOString().split('T')[0];
                    const end = new Date();
                    const start = new Date(); 
                    start.setDate(end.getDate() - 7);
                    
                    const weatherUrl = `https://archive-api.open-meteo.com/v1/archive?latitude=${latitude}&longitude=${longitude}&start_date=${formatDate(start)}&end_date=${formatDate(end)}&daily=temperature_2m_mean,precipitation_sum,relative_humidity_2m_mean&timezone=auto`;
                    const soilUrl = `https://rest.isric.org/soilgrids/v2.0/properties/query?lon=${longitude}&lat=${latitude}&property=clay&property=sand&property=silt&property=phh2o&depth=0-5cm&value=mean`;
                    const geoUrl = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&addressdetails=1`;

                    try {
                        const results = await Promise.allSettled([
                            fetch(weatherUrl).then(r => r.json()),
                            fetch(soilUrl).then(r => r.json()),
                            fetch(geoUrl, { headers: { 'User-Agent': 'SmartAgro-Web-Client' } }).then(r => r.json())
                        ]);

                        const [weather, soil, geo] = results;

                        // UI Variables
                        let finalTemp = "25", finalHum = "70", finalRain = "1200";
                        let finalPh = "6.5", finalDetectedSoil = "Loamy";
                        
                        // NEW: Calculate the season based on the current month
                        const m = new Date().getMonth() + 1; 
                        let finalSeason = "Kharif";
                        if (m >= 3 && m <= 6) {
                            finalSeason = "Zaid";
                        } else if (m >= 11 || m <= 2) {
                            finalSeason = "Rabi";
                        }

                        // Weather Parsing
                        if (weather.status === 'fulfilled' && weather.value.daily) {
                            const d = weather.value.daily;
                            const tempArr = d.temperature_2m_mean.filter(v => v != null);
                            if (tempArr.length > 0) finalTemp = (tempArr.reduce((a,b)=>a+b,0) / tempArr.length).toFixed(1);
                            
                            const humArr = d.relative_humidity_2m_mean.filter(v => v != null);
                            if (humArr.length > 0) finalHum = (humArr.reduce((a,b)=>a+b,0) / humArr.length).toFixed(0);
                            
                            const rainArr = d.precipitation_sum.filter(v => v != null);
                            if (rainArr.length > 0) finalRain = (rainArr.reduce((a,b)=>a+b,0) * 52).toFixed(0);
                        }

                        // Soil Parsing
                        if (soil.status === 'fulfilled' && soil.value.properties?.layers) {
                            const layers = soil.value.properties.layers;
                            const getPropMean = (name) => {
                                const l = layers.find(x => x.name === name);
                                return (l?.depths?.[0]?.values) ? l.depths[0].values.mean : null;
                            };
                            
                            const phRaw = getPropMean('phh2o');
                            if (phRaw !== null) {
                                finalPh = (phRaw / 10).toFixed(1);
                                finalDetectedSoil = classifySoil({
                                    clayRaw: getPropMean('clay'),
                                    sandRaw: getPropMean('sand'),
                                    siltRaw: getPropMean('silt'),
                                    ph: parseFloat(finalPh)
                                }, latitude, longitude);
                            }
                        }

                        // Update UI Elements
                        inputs.temp.value = finalTemp; labels.temp.innerText = finalTemp;
                        inputs.hum.value = finalHum; labels.hum.innerText = finalHum;
                        inputs.rain.value = finalRain; labels.rain.innerText = finalRain;
                        inputs.ph.value = finalPh; labels.ph.innerText = finalPh;
                        soilSelect.value = finalDetectedSoil;

                        // NEW: Apply the calculated season and trigger the UI update
                        if (seasonSelect) {
                            seasonSelect.value = finalSeason;
                            seasonSelect.dispatchEvent(new Event('change', { bubbles: true }));
                        }

                        // KEEPING YOUR ORIGINAL GEO & TOAST CODE INTACT:
                        if (geo.status === 'fulfilled' && geo.value.address) {
                            const city = geo.value.address.city || geo.value.address.county || geo.value.address.state || "Unknown Region";
                            document.getElementById('current-location-text').innerText = city;
                            document.getElementById('location-display').classList.remove('hidden');
                        }

                        showToast("Live data successfully fetched!", "fa-check-circle");
                    } catch (err) {
                        showToast("API sync failed. Try manual input.", "fa-xmark-circle");
                    } finally {
                        autofillBtn.innerHTML = `<i class="fas fa-location-crosshairs mr-2"></i>Sync Live Data`;
                        autofillBtn.disabled = false;
                    }
                }, () => {
                    showToast("Location access denied.", "fa-ban");
                    autofillBtn.innerHTML = `<i class="fas fa-location-crosshairs mr-2"></i>Sync Live Data`;
                    autofillBtn.disabled = false;
                });
            });
        }
    </script>
</body>
</html>
